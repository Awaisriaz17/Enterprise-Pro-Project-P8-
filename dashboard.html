<!DOCTYPE html>
<html>
<head>
    <title>Crowd Engagement Dashboard</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f4f6f9;
            text-align: center;
            padding: 40px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 400px;
            margin: auto;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
        }

        h2 {
            margin-bottom: 20px;
        }

        input[type="file"] {
            margin: 15px 0;
        }

        button {
            padding: 10px 20px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        .result {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
        }

        .error {
            margin-top: 20px;
            color: red;
        }

        a {
            display: block;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Crowd Engagement Dashboard</h2>

    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="file" required>
        <br>
        <button type="submit">Analyze</button>
    </form>

    {% if prediction is not none %}
        <div class="result">
            Engagement Level:
            {% if prediction == 1 %}
                High
            {% else %}
                Low
            {% endif %}
        </div>
    {% endif %}

    {% if error %}
        <div class="error">
            {{ error }}
        </div>
    {% endif %}

    <a href="/logout">Logout</a>
</div>

</body>
</html>
